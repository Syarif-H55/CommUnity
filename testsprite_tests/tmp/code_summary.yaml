version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 16
  - React 19
  - Tailwind CSS
  - shadcn/ui
  - Zustand
  - TanStack Query
features:
  - name: Landing Page
    description: Public home page with navigation to auth pages
    files:
      - frontend/src/app/page.tsx
    pages:
      - path: /
        description: Home page
        auth_required: false
  - name: User Login
    description: Login page for volunteers (US-002)
    files:
      - frontend/src/app/(auth)/login/page.tsx
      - frontend/src/hooks/useAuth.ts
      - frontend/src/services/auth.service.ts
    pages:
      - path: /login
        description: Login form with username and password validation
        auth_required: false
  - name: User Registration
    description: Register new volunteer account (US-001, FR-019)
    files:
      - frontend/src/app/(auth)/register/page.tsx
      - frontend/src/hooks/useAuth.ts
    pages:
      - path: /register
        description: Registration form with full_name, username, email, password fields
        auth_required: false
  - name: Forgot Password
    description: Request password reset token (US-003)
    files:
      - frontend/src/app/(auth)/forgot-password/page.tsx
    pages:
      - path: /forgot-password
        description: Email input form to request reset token
        auth_required: false
  - name: Reset Password
    description: Reset password with token (US-003)
    files:
      - frontend/src/app/(auth)/reset-password/page.tsx
    pages:
      - path: /reset-password
        description: Form to set new password using reset token
        auth_required: false
  - name: Dashboard
    description: Protected dashboard after login (TASK-005)
    files:
      - frontend/src/app/dashboard/page.tsx
      - frontend/src/components/auth/AuthGuard.tsx
    pages:
      - path: /dashboard
        description: Protected page requiring authentication
        auth_required: true
  - name: Profile Management
    description: View and edit user profile with photo upload (US-004)
    files:
      - frontend/src/app/profile/page.tsx
      - frontend/src/hooks/useAuth.ts
    pages:
      - path: /profile
        description: Profile view, edit form, and photo upload
        auth_required: true
    depends_on:
      - User Login
known_limitations:
  - issue: Frontend dev server used; TestSprite limits to 15 high-priority tests in dev mode
    location: frontend/package.json
    impact: Not all UI flows may be tested in single run
